<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特鹽風 ✦ OC 極簡塗鴉牆設計器</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              pink: '#ffd1dc',
              purple: '#e8dbfc',
              green: '#d4ebd0',
              blue: '#d0e1fd',
              grey: '#e2e8f0',
            }
          }
        }
      }
    }
  </script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }
    /* 隱藏滾動條但保持功能 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 玻璃擬態 */
    .glass-card {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .dark .glass-card {
      background: rgba(15, 15, 15, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    /* 唯讀去背 */
    .transparent-bg {
      background: transparent !important;
    }
  </style>
</head>
<body class="h-full bg-slate-50 dark:bg-[#191919] text-slate-800 dark:text-slate-100 transition-colors duration-300 overflow-x-hidden">

  <!-- 炫光背景效果 (僅在編輯模式下顯示) -->
  <div id="glowBg" class="fixed -inset-[10px] opacity-30 pointer-events-none z-0 transition-all duration-700">
    <div class="absolute top-[10%] left-[5%] w-[400px] h-[400px] rounded-full bg-pink-300 dark:bg-pink-900/30 blur-[100px] animate-pulse"></div>
    <div class="absolute bottom-[10%] right-[5%] w-[500px] h-[500px] rounded-full bg-indigo-300 dark:bg-purple-900/30 blur-[120px] animate-pulse" style="animation-duration: 8s;"></div>
  </div>

  <!-- 主容器 -->
  <div class="relative z-10 min-h-screen flex flex-col lg:flex-row p-4 lg:p-8 gap-8 max-w-[1600px] mx-auto">
    
    <!-- 左側：相簿展示區 -->
    <div class="flex-1 flex flex-col items-center justify-center min-w-0 w-full">
      
      <!-- 相簿主卡片 -->
      <div id="galleryWidget" class="w-full max-w-4xl glass-card rounded-3xl p-6 shadow-2xl transition-all duration-500 flex flex-col gap-5">
        
        <!-- 卡片頭部：極簡控制與模式切換 -->
        <div class="flex items-center justify-between gap-4 border-b border-white/20 dark:border-white/5 pb-4">
          <div class="flex items-center gap-2.5">
            <div id="themeIcon" class="w-8 h-8 rounded-xl flex items-center justify-center shadow-inner transition-colors duration-300" style="background-color: var(--theme-color-light, #ffd1dc);">
              <svg class="w-4 h-4 text-slate-700 dark:text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </div>
            <span class="text-xs font-bold tracking-widest text-slate-500 dark:text-slate-400">ARTWORKS</span>
          </div>

          <!-- 模式切換按鈕 -->
          <div class="flex bg-white/40 dark:bg-black/25 p-1 rounded-2xl border border-white/30 dark:border-white/5">
            <button id="btnSlideMode" onclick="switchMode('slide')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-medium transition-all duration-300 bg-white dark:bg-zinc-800 shadow-sm text-slate-950 dark:text-white">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              幻燈片播放
            </button>
            <button id="btnGridMode" onclick="switchMode('grid')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-medium transition-all duration-300 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
              瀑布流牆
            </button>
          </div>
        </div>

        <!-- 視圖 A：幻燈片播放器 -->
        <div id="viewSlide" class="relative group w-full flex flex-col justify-center">
          <!-- 大圖顯示區 -->
          <div class="relative w-full aspect-[4/3] rounded-2xl overflow-hidden bg-slate-100/50 dark:bg-zinc-950/40 border border-white/20 dark:border-white/5 flex items-center justify-center shadow-inner">
            <div id="slideImageContainer" class="w-full h-full flex items-center justify-center select-none">
              <!-- 動態圖片載入 -->
            </div>

            <!-- 左右導航箭頭 -->
            <button onclick="prevSlide()" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/70 dark:bg-black/50 hover:bg-white dark:hover:bg-black text-slate-800 dark:text-white flex items-center justify-center shadow-md opacity-0 group-hover:opacity-100 transition-opacity duration-300 border border-white/20">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <button onclick="nextSlide()" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/70 dark:bg-black/50 hover:bg-white dark:hover:bg-black text-slate-800 dark:text-white flex items-center justify-center shadow-md opacity-0 group-hover:opacity-100 transition-opacity duration-300 border border-white/20">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
            </button>

            <!-- 右上角自動播放指示 -->
            <div id="autoplayBadge" class="hidden absolute top-4 right-4 bg-black/60 backdrop-blur-md text-white text-[10px] font-semibold px-2 py-1 rounded-lg flex items-center gap-1.5">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping"></span>
              Auto
            </div>
          </div>

          <!-- 下方極簡頁數計數器 -->
          <div class="mt-4 flex items-center justify-between px-2">
            <span id="slideNumTag" class="text-xs font-mono font-bold tracking-widest text-slate-400 dark:text-slate-500">#01</span>
            <span id="slideCounter" class="text-[10px] font-mono tracking-wider px-2.5 py-0.5 rounded-full bg-slate-200/50 dark:bg-zinc-800 text-slate-500 dark:text-slate-400 border border-white/10 ml-auto shrink-0">01 / 10</span>
          </div>
          
          <!-- 滑桿小圓點 -->
          <div id="slideDots" class="flex justify-center gap-1.5 mt-3 overflow-x-auto py-1 max-w-full no-scrollbar">
            <!-- 動態點點 -->
          </div>
        </div>

        <!-- 視圖 B：相片牆 -->
        <div id="viewGrid" class="hidden w-full flex flex-col gap-4">
          <!-- 網格容器 -->
          <div id="gridContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 max-h-[60vh] overflow-y-auto pr-1 no-scrollbar scroll-smooth">
            <!-- 網格縮圖 -->
          </div>
        </div>

      </div>

      <!-- Notion 嵌入模式的齒輪按鈕 (預設隱藏，只有在 editMode 時才供管理者備用) -->
      <button id="embedSettingsBtn" onclick="toggleEditor()" class="hidden fixed bottom-4 right-4 w-10 h-10 rounded-full bg-white/80 dark:bg-zinc-900/80 text-slate-700 dark:text-slate-200 flex items-center justify-center shadow-lg border border-white/30 dark:border-white/10 hover:scale-105 active:scale-95 transition-all z-50">
        <svg class="w-5 h-5 animate-spin-slow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </button>
    </div>

    <!-- 右側：編輯控制台 (預設加上 hidden 避免閃爍) -->
    <div id="editPanel" class="hidden w-full lg:w-96 flex flex-col gap-6 z-20">
      <div class="glass-card rounded-3xl p-6 shadow-2xl flex flex-col gap-5 sticky top-8">
        <div class="border-b border-white/20 dark:border-white/5 pb-3">
          <h2 class="text-base font-bold flex items-center gap-2">
            <span class="flex h-2.5 w-2.5 relative">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-pink-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-pink-500"></span>
            </span>
            極簡塗鴉牆設計台
          </h2>
          <p class="text-[10px] text-slate-400 mt-1">自訂卡片配色，並打包成永久保存的網址</p>
        </div>

        <!-- 滾動面板 -->
        <div class="flex flex-col gap-4 max-h-[70vh] overflow-y-auto pr-1 no-scrollbar">
          
          <!-- 配色方案 -->
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold tracking-wider text-slate-500 dark:text-slate-400">1. 特鹽馬卡龍配色</label>
            <div class="grid grid-cols-5 gap-2 mt-1">
              <button onclick="selectTheme('#ffd1dc', '#ffd1dc', '#fff0f3')" class="w-full aspect-square rounded-xl bg-brand-pink border-2 border-white dark:border-zinc-800 shadow-sm flex items-center justify-center hover:scale-105 active:scale-95 transition-all" title="櫻花粉"></button>
              <button onclick="selectTheme('#e8dbfc', '#e8dbfc', '#f7f3fd')" class="w-full aspect-square rounded-xl bg-brand-purple border-2 border-transparent shadow-sm flex items-center justify-center hover:scale-105 active:scale-95 transition-all" title="幻境紫"></button>
              <button onclick="selectTheme('#d4ebd0', '#d4ebd0', '#f1faf0')" class="w-full aspect-square rounded-xl bg-brand-green border-2 border-transparent shadow-sm flex items-center justify-center hover:scale-105 active:scale-95 transition-all" title="青提綠"></button>
              <button onclick="selectTheme('#d0e1fd', '#d0e1fd', '#f0f5fe')" class="w-full aspect-square rounded-xl bg-brand-blue border-2 border-transparent shadow-sm flex items-center justify-center hover:scale-105 active:scale-95 transition-all" title="深海藍"></button>
              <button onclick="selectTheme('#cbd5e1', '#e2e8f0', '#f8fafc')" class="w-full aspect-square rounded-xl bg-brand-grey border-2 border-transparent shadow-sm flex items-center justify-center hover:scale-105 active:scale-95 transition-all" title="優雅灰"></button>
            </div>
            <!-- 自訂配色 -->
            <div class="flex items-center gap-3 mt-2">
              <div class="flex items-center gap-1.5 bg-white/40 dark:bg-black/20 p-1.5 rounded-xl border border-white/20">
                <input type="color" id="themeColorPicker" oninput="customTheme(this.value)" class="w-5 h-5 rounded-lg border-0 cursor-pointer bg-transparent">
                <span class="text-[10px] font-mono text-slate-500">自訂顏色</span>
              </div>
              <button onclick="toggleDarkMode()" class="ml-auto flex items-center gap-1 px-2.5 py-1.5 rounded-xl bg-white/40 dark:bg-black/25 text-xs border border-white/20 shadow-sm">
                <span class="dark:hidden">🌙 深色模式</span>
                <span class="hidden dark:inline">☀️ 淺色模式</span>
              </button>
            </div>
          </div>

          <!-- 圖片來源設定 -->
          <div class="flex flex-col gap-3">
            <label class="text-xs font-bold tracking-wider text-slate-500 dark:text-slate-400">2. 圖片來源與託管設定</label>
            
            <!-- 三模選擇 -->
            <div class="flex bg-white/30 dark:bg-black/20 p-1 rounded-xl border border-white/20 gap-0.5">
              <button onclick="setImageSourceMode('mock')" id="sourceBtnMock" class="flex-1 py-1 text-[10px] font-medium rounded-lg text-center transition-all duration-300">內建展示</button>
              <button onclick="setImageSourceMode('custom')" id="sourceBtnCustom" class="flex-1 py-1 text-[10px] font-medium rounded-lg text-center transition-all duration-300 text-slate-500">託管路徑</button>
              <button onclick="setImageSourceMode('list')" id="sourceBtnList" class="flex-1 py-1 text-[10px] font-medium rounded-lg text-center transition-all duration-300 text-slate-500">網址清單</button>
            </div>

            <!-- 託管參數設定區 (智慧適應 image/ image(2)/ image(3) 路由分流) -->
            <div id="customSourcePanel" class="hidden flex flex-col gap-2.5 p-3 rounded-2xl bg-white/30 dark:bg-black/25 border border-white/15">
              <div class="flex flex-col gap-1">
                <span class="text-[10px] text-slate-400">資料夾相對路徑 (預設即可)</span>
                <input type="text" id="iptImgPath" oninput="updateImgConfig()" placeholder="./image/" class="px-3 py-1.5 text-xs rounded-xl bg-white/50 dark:bg-black/20 border border-white/20 outline-none text-slate-800 dark:text-white font-mono">
              </div>
              <div class="grid grid-cols-2 gap-2">
                <div class="flex flex-col gap-1">
                  <span class="text-[10px] text-slate-400">總圖片數量 (張)</span>
                  <input type="number" id="iptTotalImages" oninput="updateImgConfig()" value="10" min="1" max="500" class="px-3 py-1.5 text-xs rounded-xl bg-white/50 dark:bg-black/20 border border-white/20 outline-none">
                </div>
                <div class="flex flex-col gap-1">
                  <span class="text-[10px] text-slate-400">副檔名</span>
                  <select id="iptFileExt" onchange="updateImgConfig()" class="px-3 py-1.5 text-xs rounded-xl bg-white/50 dark:bg-black/20 border border-white/20 outline-none dark:text-white bg-slate-100">
                    <option value=".jpg">.jpg</option>
                    <option value=".png">.png</option>
                    <option value=".gif">.gif</option>
                    <option value=".webp">.webp</option>
                  </select>
                </div>
              </div>
              <p class="text-[9px] text-slate-400 leading-normal">
                🚀 <b>智慧分流已啟用：</b><br>
                1~100張 從 <code class="text-pink-500 font-mono">image/</code> 讀取<br>
                101~200張 從 <code class="text-pink-500 font-mono">image(2)/</code> 讀取<br>
                201~300張 從 <code class="text-pink-500 font-mono">image(3)/</code> 讀取！
              </p>
            </div>

            <!-- 網址清單模式區 -->
            <div id="listSourcePanel" class="hidden flex flex-col gap-2.5 p-3 rounded-2xl bg-white/30 dark:bg-black/25 border border-white/15">
              <span class="text-[10px] text-slate-400">批次貼入圖片直鏈 (一行輸入一個網址)</span>
              <textarea id="iptImgList" oninput="updateImgListConfig()" placeholder="https://catbox.moe/example1.png&#10;https://catbox.moe/example2.png&#10;https://catbox.moe/example3.png" rows="5" class="w-full px-3 py-1.5 text-xs rounded-xl bg-white/50 dark:bg-black/20 border border-white/20 outline-none text-slate-800 dark:text-white font-mono no-scrollbar resize-none"></textarea>
              <p class="text-[9px] text-slate-400 leading-normal">
                💡 <b>免部署！</b>將塗鴉批次上傳至 Postimages 等圖床，取得「直接連結」並在此一行貼一個網址即可。
              </p>
            </div>
          </div>

          <!-- 幻燈片設定 -->
          <div class="flex flex-col gap-2 p-3 rounded-2xl bg-white/30 dark:bg-black/20 border border-white/20">
            <span class="text-xs font-bold text-slate-500 dark:text-slate-400">3. 幻燈片自動播放設定</span>
            <div class="flex items-center justify-between">
              <span class="text-xs text-slate-500">自動播放</span>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="iptAutoplay" onchange="toggleAutoplayConfig(this.checked)" class="sr-only peer">
                <div class="w-9 h-5 bg-gray-200 dark:bg-zinc-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-pink-400"></div>
              </label>
            </div>
            <div class="flex items-center justify-between mt-1">
              <span class="text-[10px] text-slate-400">切換時間間隔 (秒)</span>
              <input type="number" id="iptInterval" oninput="updateInterval(this.value)" value="4" min="2" max="15" class="w-16 px-2 py-0.5 text-xs text-center rounded-lg bg-white/50 dark:bg-black/20 border border-white/20 outline-none">
            </div>
          </div>

        </div>

        <!-- 按鈕區 -->
        <div class="flex flex-col gap-2 border-t border-white/20 dark:border-white/5 pt-4">
          <button onclick="generateEmbedUrl()" class="w-full py-3 rounded-2xl bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 hover:from-pink-400 hover:to-indigo-400 text-slate-900 font-bold text-xs tracking-wider shadow-md hover:shadow-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
            生成並複製 Notion 嵌入連結
          </button>
          <button onclick="resetConfig()" class="w-full py-2 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-zinc-800 dark:hover:bg-zinc-700 text-slate-500 dark:text-slate-400 text-xs font-semibold active:scale-98 transition-all">
            還原預設範本
          </button>
        </div>

      </div>
    </div>

  </div>

  <!-- 沉浸式 Lightbox 燈箱元件 -->
  <div id="lightbox" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex flex-col items-center justify-center p-4" onclick="closeLightbox()">
    <button onclick="closeLightbox()" class="absolute top-6 right-6 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center border border-white/10 transition-all">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div class="relative max-w-5xl max-h-[85vh] flex items-center justify-center animate-zoom-in" onclick="event.stopPropagation()">
      <div id="lightboxContent" class="w-full h-full flex items-center justify-center">
        <!-- 放大圖片 -->
      </div>
    </div>
  </div>

  <!-- 自製輕量 Toast 提示框 -->
  <div id="toastContainer" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- 程式碼腳本邏輯 -->
  <script>
    // 1. 神奇手繪 SVG 塗鴉範本庫
    const doodleSVGs = [

      `<svg viewBox="0 0 100 100" class="w-full h-full p-8"><path d="M50,40 Q35,20 25,35 Q15,50 50,80 Q85,50 75,35 Q65,20 50,40 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/><path d="M35,45 Q40,48 50,40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M65,45 Q60,48 50,40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="30" cy="65" r="2" fill="currentColor"/><circle cx="70" cy="60" r="3" fill="none" stroke="currentColor"/></svg>`,

      `<svg viewBox="0 0 100 100" class="w-full h-full p-8"><path d="M50,25 C45,10 55,10 50,25 Z M50,25 C65,20 65,30 50,25 Z M50,25 C55,40 45,40 50,25 Z M50,25 C35,30 35,20 50,25 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="50" cy="25" r="2" fill="currentColor"/><path d="M20,65 Q30,62 35,70" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M75,60 Q70,70 82,68" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>`,
      `<svg viewBox="0 0 100 100" class="w-full h-full p-8"><path d="M30,80 L70,40" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><circle cx="73" cy="37" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M68,37 L78,37" stroke="currentColor" stroke-width="1.5"/><path d="M73,32 L73,42" stroke="currentColor" stroke-width="1.5"/><path d="M62,48 C55,52 50,60 55,65" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>`,
      `<svg viewBox="0 0 100 100" class="w-full h-full p-8"><circle cx="50" cy="50" r="8" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M50,15 L50,30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M50,70 L50,85" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M15,50 L30,50" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M70,50 L85,50" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="30" cy="30" r="3" fill="currentColor"/><circle cx="70" cy="70" r="3" fill="currentColor"/></svg>`,
      `<svg viewBox="0 0 100 100" class="w-full h-full p-8"><path d="M30,40 L70,40 L65,80 L35,80 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/><path d="M70,48 C78,48 78,65 70,65" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M42,20 Q45,30 42,35" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M52,18 Q55,28 52,33" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M42,55 Q50,60 58,55" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>`,
      `<svg viewBox="0 0 100 100" class="w-full h-full p-8"><path d="M30,25 L70,25 L55,50 L70,75 L30,75 L45,50 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/><line x1="25" y1="25" x2="75" y2="25" stroke="currentColor" stroke-width="3"/><line x1="25" y1="75" x2="75" y2="75" stroke="currentColor" stroke-width="3"/><circle cx="50" cy="35" r="2" fill="currentColor"/><circle cx="50" cy="65" r="4" fill="currentColor"/><path d="M50,48 L50,58" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/></svg>`
    ];

    // 主題色調配置對照表
    const themes = {
      '#ffd1dc': { light: '#ffd1dc', dark: '#502a33', bg: '#fff0f3' },
      '#e8dbfc': { light: '#e8dbfc', dark: '#372a50', bg: '#f7f3fd' },
      '#d4ebd0': { light: '#d4ebd0', dark: '#223c20', bg: '#f1faf0' },
      '#d0e1fd': { light: '#d0e1fd', dark: '#223354', bg: '#f0f5fe' },
      '#cbd5e1': { light: '#e2e8f0', dark: '#2d3748', bg: '#f8fafc' }
    };

    // 預設設定 (將所有冗長文字與命名備註功能 100% 物理移除)
    let config = {
      themeColor: "#ffd1dc",
      isDark: false,
      sourceMode: "mock", // 'mock', 'custom', 'list'
      imgPath: "",
      totalImages: 10,
      fileExtension: ".jpg",
      imgList: [],
      autoplay: false,
      interval: 4
    };

    let currentSlideIdx = 1;
    let autoplayTimer = null;
    let currentViewMode = 'slide';

    // 3. 初始化載入
    window.onload = function() {
      loadUrlParams();
      
      if (config.isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }

      syncConfigToInputs();
      applyTheme();
      renderSlide();
      renderGrid();

      if (config.autoplay) {
        startAutoplay();
      }
    };

    // 4. 同步資料與控制台輸入框
    function syncConfigToInputs() {
      // 確保輸入框存在才進行同步，避免 DOM 物理拔除後出錯
      const pathIpt = document.getElementById('iptImgPath');
      if (pathIpt) pathIpt.value = config.imgPath || "./image/";
      
      const totalIpt = document.getElementById('iptTotalImages');
      if (totalIpt) totalIpt.value = config.totalImages;
      
      const extIpt = document.getElementById('iptFileExt');
      if (extIpt) extIpt.value = config.fileExtension;
      
      const autoIpt = document.getElementById('iptAutoplay');
      if (autoIpt) autoIpt.checked = config.autoplay;
      
      const intIpt = document.getElementById('iptInterval');
      if (intIpt) intIpt.value = config.interval;
      
      const listIpt = document.getElementById('iptImgList');
      if (listIpt) listIpt.value = config.imgList.join('\n');
    }

    // 5. 主題配色與深色模式
    function selectTheme(color) {
      config.themeColor = color;
      applyTheme();
    }

    function customTheme(color) {
      config.themeColor = color;
      applyTheme();
    }

    function applyTheme() {
      const color = config.themeColor;
      const themeDetail = themes[color] || { light: color, dark: color, bg: color + '15' };

      document.documentElement.style.setProperty('--theme-color-light', themeDetail.light);
      document.documentElement.style.setProperty('--theme-color-dark', themeDetail.dark);
      document.getElementById('themeIcon').style.backgroundColor = themeDetail.light;
      
      const isDark = document.documentElement.classList.contains('dark');
      const container = document.getElementById('galleryWidget');
      
      if (isDark) {
        container.style.boxShadow = `0 25px 50px -12px ${color}15`;
      } else {
        container.style.boxShadow = `0 25px 50px -12px ${color}35`;
      }
      
      updateSlideDots();
    }

    function toggleDarkMode() {
      config.isDark = !config.isDark;
      if (config.isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      applyTheme();
    }

    // 6. 三模圖片來源控制
    function setImageSourceMode(mode) {
      config.sourceMode = mode;
      
      const customPanel = document.getElementById('customSourcePanel');
      const listPanel = document.getElementById('listSourcePanel');
      
      const btnMock = document.getElementById('sourceBtnMock');
      const btnCustom = document.getElementById('sourceBtnCustom');
      const btnList = document.getElementById('sourceBtnList');

      // 檢查控制面板是否還存在於 DOM (防止唯讀模式時報錯)
      if (customPanel && listPanel && btnMock && btnCustom && btnList) {
        customPanel.classList.add('hidden');
        listPanel.classList.add('hidden');
        
        btnMock.className = "flex-1 py-1 text-[10px] font-medium rounded-lg text-center text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200";
        btnCustom.className = "flex-1 py-1 text-[10px] font-medium rounded-lg text-center text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200";
        btnList.className = "flex-1 py-1 text-[10px] font-medium rounded-lg text-center text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200";

        if (mode === 'custom') {
          customPanel.classList.remove('hidden');
          btnCustom.className = "flex-1 py-1 text-[10px] font-medium rounded-lg text-center bg-white dark:bg-zinc-800 shadow-sm text-slate-800 dark:text-white border border-white/10";
        } else if (mode === 'list') {
          listPanel.classList.remove('hidden');
          btnList.className = "flex-1 py-1 text-[10px] font-medium rounded-lg text-center bg-white dark:bg-zinc-800 shadow-sm text-slate-800 dark:text-white border border-white/10";
        } else {
          btnMock.className = "flex-1 py-1 text-[10px] font-medium rounded-lg text-center bg-white dark:bg-zinc-800 shadow-sm text-slate-800 dark:text-white border border-white/10";
        }
      }

      if (currentSlideIdx > getMaxImagesCount()) {
        currentSlideIdx = 1;
      }
      renderSlide();
      renderGrid();
    }

    function getMaxImagesCount() {
      if (config.sourceMode === 'mock') {
        return 10;
      } else if (config.sourceMode === 'list') {
        return Math.max(1, config.imgList.length);
      } else {
        return config.totalImages;
      }
    }

    function updateImgConfig() {
      config.imgPath = document.getElementById('iptImgPath').value;
      config.totalImages = parseInt(document.getElementById('iptTotalImages').value) || 10;
      config.fileExtension = document.getElementById('iptFileExt').value;

      renderSlide();
      renderGrid();
    }

    function updateImgListConfig() {
      const text = document.getElementById('iptImgList').value;
      config.imgList = text.split('\n').map(url => url.trim()).filter(url => url.length > 0);
      
      if (currentSlideIdx > getMaxImagesCount()) {
        currentSlideIdx = 1;
      }
      renderSlide();
      renderGrid();
    }

    // 7. 核心智慧分流路徑計算：無感將 1~100張, 101~200張, 201+張 指向對應資料夾
    function getSmartRoutedPath(idx, originalPath) {
      let path = originalPath.trim();
      if (!path) {
        path = "./image/";
      }
      if (!path.endsWith('/')) {
        path += '/';
      }

      // 如果路徑中有 image 字樣，觸發分箱自動路徑調度
      if (/image/i.test(path)) {
        if (idx > 200) {
          return path.replace(/image(\(\d+\))?\/?$/i, "image(3)/");
        } else if (idx > 100) {
          return path.replace(/image(\(\d+\))?\/?$/i, "image(2)/");
        } else {
          return path.replace(/image(\(\d+\))?\/?$/i, "image/");
        }
      }
      return path;
    }

    // 8. 圖片渲染
    function getImageHTML(idx, cssClasses = "max-w-full max-h-full object-contain rounded-xl") {
      if (config.sourceMode === 'mock') {
        const color = config.themeColor;
        const svgContent = doodleSVGs[(idx - 1) % doodleSVGs.length];
        return `
          <div class="w-full h-full flex flex-col items-center justify-center transition-all duration-500" style="color: ${color};">
            ${svgContent}
          </div>
        `;
      } else if (config.sourceMode === 'list') {
        const url = config.imgList[idx - 1];
        if (!url) {
          return imgFallbackPlaceholder(idx);
        }
        return `
          <img src="${url}" 
               alt="Doodle #${idx}" 
               loading="lazy"
               class="${cssClasses}" 
               onerror="imgLoadError(this, ${idx})">
        `;
      } else {
        const targetFolder = getSmartRoutedPath(idx, config.imgPath);
        const imgSrc = `${targetFolder}${idx}${config.fileExtension}`;
        return `
          <img src="${imgSrc}" 
               alt="Doodle #${idx}" 
               loading="lazy"
               class="${cssClasses}" 
               onerror="imgLoadError(this, ${idx})">
        `;
      }
    }

    function imgFallbackPlaceholder(idx) {
      const color = config.themeColor;
      const svgContent = doodleSVGs[(idx - 1) % doodleSVGs.length];
      return `
        <div class="w-full h-full flex flex-col items-center justify-center p-6 transition-all duration-500" style="color: ${color}40;">
          ${svgContent}
          <span class="text-[9px] text-slate-400 dark:text-slate-500 font-mono tracking-wider -mt-4">未偵測到外部圖檔 #${idx}</span>
        </div>
      `;
    }

    function imgLoadError(imgElement, idx) {
      const parent = imgElement.parentElement;
      if (parent) {
        parent.innerHTML = imgFallbackPlaceholder(idx);
      }
    }

    // 9. 雙視圖切換
    function switchMode(mode) {
      currentViewMode = mode;
      const viewSlide = document.getElementById('viewSlide');
      const viewGrid = document.getElementById('viewGrid');
      const btnSlide = document.getElementById('btnSlideMode');
      const btnGrid = document.getElementById('btnGridMode');

      if (mode === 'slide') {
        viewSlide.classList.remove('hidden');
        viewGrid.classList.add('hidden');
        btnSlide.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-medium transition-all duration-300 bg-white dark:bg-zinc-800 shadow-sm text-slate-950 dark:text-white";
        btnGrid.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-medium transition-all duration-300 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200";
        renderSlide();
      } else {
        viewSlide.classList.add('hidden');
        viewGrid.classList.remove('hidden');
        btnGrid.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-medium transition-all duration-300 bg-white dark:bg-zinc-800 shadow-sm text-slate-950 dark:text-white";
        btnSlide.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-medium transition-all duration-300 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200";
        stopAutoplay();
        renderGrid();
      }
    }

    // 10. 幻燈片渲染
    function renderSlide() {
      const container = document.getElementById('slideImageContainer');
      container.innerHTML = getImageHTML(currentSlideIdx, "max-w-full max-h-full object-contain rounded-xl hover:scale-[1.01] transition-transform duration-500 cursor-pointer");
      container.onclick = () => openLightbox(currentSlideIdx);

      // 更新極簡指示序號
      document.getElementById('slideNumTag').innerText = `#${String(currentSlideIdx).padStart(2, '0')}`;
      const total = getMaxImagesCount();
      document.getElementById('slideCounter').innerText = `${String(currentSlideIdx).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;

      updateSlideDots();
    }

    // 左右切換
    function prevSlide() {
      const total = getMaxImagesCount();
      currentSlideIdx = currentSlideIdx - 1 < 1 ? total : currentSlideIdx - 1;
      renderSlide();
    }

    function nextSlide() {
      const total = getMaxImagesCount();
      currentSlideIdx = currentSlideIdx + 1 > total ? 1 : currentSlideIdx + 1;
      renderSlide();
    }

    function jumpToSlide(idx) {
      currentSlideIdx = idx;
      renderSlide();
    }

    function updateSlideDots() {
      const dotsContainer = document.getElementById('slideDots');
      dotsContainer.innerHTML = '';
      const total = getMaxImagesCount();

      // 超過 15 張自動不渲染點點，維持最乾淨極簡的卡片高度
      if (total > 15) {
        dotsContainer.style.display = 'none';
        return;
      }
      dotsContainer.style.display = 'flex';

      for (let i = 1; i <= total; i++) {
        const dot = document.createElement('button');
        dot.onclick = () => jumpToSlide(i);
        
        if (i === currentSlideIdx) {
          dot.className = "w-6 h-2 rounded-full transition-all duration-300 shadow-sm shrink-0";
          dot.style.backgroundColor = config.themeColor;
        } else {
          dot.className = "w-2 h-2 rounded-full bg-slate-300 dark:bg-zinc-700 hover:bg-slate-400 transition-all duration-300 shrink-0";
        }
        dotsContainer.appendChild(dot);
      }
    }

    // 11. 自動播放控制
    function toggleAutoplayConfig(isChecked) {
      config.autoplay = isChecked;
      if (isChecked) {
        startAutoplay();
        document.getElementById('autoplayBadge').classList.remove('hidden');
      } else {
        stopAutoplay();
        document.getElementById('autoplayBadge').classList.add('hidden');
      }
    }

    function updateInterval(seconds) {
      config.interval = parseInt(seconds) || 4;
      if (config.autoplay) {
        stopAutoplay();
        startAutoplay();
      }
    }

    function startAutoplay() {
      if (autoplayTimer) clearInterval(autoplayTimer);
      autoplayTimer = setInterval(() => {
        nextSlide();
      }, config.interval * 1000);
    }

    function stopAutoplay() {
      if (autoplayTimer) {
        clearInterval(autoplayTimer);
        autoplayTimer = null;
      }
    }

    // 12. 相片牆網格渲染
    function renderGrid() {
      const grid = document.getElementById('gridContainer');
      grid.innerHTML = '';
      const total = getMaxImagesCount();

      for (let i = 1; i <= total; i++) {
        const item = document.createElement('div');
        item.className = "relative aspect-square rounded-2xl overflow-hidden bg-white/20 dark:bg-black/15 border border-white/20 dark:border-white/5 flex items-center justify-center p-3 cursor-pointer hover:scale-[1.03] hover:shadow-lg hover:border-pink-200 dark:hover:border-zinc-700 transition-all duration-300 group shadow-inner";
        item.onclick = () => openLightbox(i);

        const imgWrapper = document.createElement('div');
        imgWrapper.className = "w-full h-full flex items-center justify-center select-none";
        imgWrapper.innerHTML = getImageHTML(i, "max-w-full max-h-full object-contain rounded-xl");
        item.appendChild(imgWrapper);

        const tag = document.createElement('div');
        tag.className = "absolute bottom-3 left-3 bg-black/50 backdrop-blur-md px-2 py-0.5 rounded-lg text-[9px] font-mono text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300";
        tag.innerText = `#${String(i).padStart(2, '0')}`;
        item.appendChild(tag);

        grid.appendChild(item);
      }
    }

    // 13. 燈箱
    function openLightbox(idx) {
      const lightbox = document.getElementById('lightbox');
      const content = document.getElementById('lightboxContent');

      content.innerHTML = getImageHTML(idx, "max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl");
      lightbox.classList.remove('hidden');
      lightbox.classList.add('flex');
    }

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.add('hidden');
      lightbox.classList.remove('flex');
    }

    // 14. Notion 連結生成：安全隔離，產出不包含 ?edit=true 的觀賞連結
    function generateEmbedUrl() {
      try {
        const dataToEncode = {
          tc: config.themeColor,
          dark: config.isDark,
          sm: config.sourceMode,
          ip: config.imgPath,
          ti: config.totalImages,
          fe: config.fileExtension,
          il: config.imgList,
          ap: config.autoplay,
          it: config.interval
        };

        const jsonStr = JSON.stringify(dataToEncode);
        const encodedData = btoa(encodeURIComponent(jsonStr));
        
        const baseUrl = window.location.origin + window.location.pathname;
        // 重要：這串網址不帶 ?edit=true，因此任何人打開或在 Notion 看見，編輯面板都會被 100% 銷毀
        const embedUrl = `${baseUrl}?embed=true#${encodedData}`;

        copyToClipboard(embedUrl);
        showToast("🌸 專屬唯讀極簡網址已複製！快在 Notion 中貼上吧！");
      } catch (err) {
        showToast("⚠️ 生成失敗，請重試", "error");
      }
    }

    // 15. 安全機制控制：偵測是否解鎖編輯器
    function loadUrlParams() {
      const hash = window.location.hash.substring(1);
      const urlParams = new URLSearchParams(window.location.search);
      const isEmbed = urlParams.get('embed') === 'true';
      const isEditMode = urlParams.get('edit') === 'true'; // 是否手動解鎖了編輯器

      if (isEditMode) {
        // 只有加上 ?edit=true 時，才展示編輯面板與背景特效
        const editPanel = document.getElementById('editPanel');
        if (editPanel) editPanel.classList.remove('hidden');
      } else {
        // 預設模式（不管是普通發布連結還是嵌入）：一律物理拔除編輯面板，防止任何人動手腳
        const editPanel = document.getElementById('editPanel');
        if (editPanel) editPanel.remove(); 
        
        const glowBg = document.getElementById('glowBg');
        if (glowBg) glowBg.remove();

        // 隱藏右下角的齒輪，任何人點開都不會再進入編輯頁面
        const embedSettingsBtn = document.getElementById('embedSettingsBtn');
        if (embedSettingsBtn) embedSettingsBtn.remove();

        // Notion 嵌入模式下的水晶通透化
        if (isEmbed) {
          document.getElementById('galleryWidget').classList.add('transparent-bg', 'shadow-none');
          document.getElementById('galleryWidget').classList.remove('glass-card');
        }
      }

      if (hash) {
        try {
          const decodedJson = decodeURIComponent(atob(hash));
          const data = JSON.parse(decodedJson);

          config.themeColor = data.tc || config.themeColor;
          config.isDark = data.dark !== undefined ? data.dark : config.isDark;
          config.sourceMode = data.sm || config.sourceMode;
          config.imgPath = data.ip || config.imgPath;
          config.totalImages = data.ti || config.totalImages;
          config.fileExtension = data.fe || config.fileExtension;
          config.imgList = data.il || config.imgList;
          config.autoplay = data.ap !== undefined ? data.ap : config.autoplay;
          config.interval = data.it || config.interval;

        } catch (e) {
          console.warn("解析 hash 失敗。");
        }
      }
    }

    function toggleEditor() {
      // 只有在編輯模式下此齒輪才會備用載入
      const baseUrl = window.location.href.split('?')[0];
      const editWindow = window.open(baseUrl + "?edit=true" + window.location.hash, '_blank');
      showToast("🌸 已在新分頁打開編輯模式！");
    }

    function resetConfig() {
      if (confirm("確定要將所有色調、圖片路徑設定重置嗎？")) {
        window.location.hash = "";
        window.location.search = "";
        window.location.reload();
      }
    }

    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text);
      } else {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
        } catch (err) {
          console.error('複製失敗: ', err);
        }
        document.body.removeChild(textArea);
      }
    }

    function showToast(message, type = "success") {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const themeColor = config.themeColor;
      
      toast.className = "px-4 py-2.5 rounded-2xl text-xs font-semibold shadow-lg border backdrop-blur-md transform translate-y-2 opacity-0 transition-all duration-300 flex items-center gap-2";
      
      if (type === "success") {
        toast.className += " bg-white/90 dark:bg-zinc-900/90 text-slate-800 dark:text-slate-100 border-white/20";
        toast.style.borderLeft = `4px solid ${themeColor}`;
      } else {
        toast.className += " bg-red-50 dark:bg-red-950/90 text-red-600 dark:text-red-200 border-red-200/50";
      }

      toast.innerText = message;
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
      }, 50);

      setTimeout(() => {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }
  </script>
</body>
</html>
